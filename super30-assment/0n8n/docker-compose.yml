services:
  postgres:
    image: postgres:16
    container_name: autm8n-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autm8n
    # 5433 on the host: 5432 is commonly already taken by another local Postgres.
    ports:
      - "5433:5432"
    volumes:
      - autm8n-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autm8n"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  autm8n-pgdata:
